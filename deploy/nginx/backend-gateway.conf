server {
  listen 8080;
  server_name _;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location = / {
    proxy_pass http://public-api:8080/;
  }

  location /docs/ {
    proxy_pass http://public-api:8080/docs/;
  }

  location /uploads/ {
    proxy_pass http://public-api:8080/uploads/;
  }

  location = /api/v1/healthz {
    proxy_pass http://public-api:8080/api/v1/healthz;
  }

  location /api/v1/public/ {
    proxy_pass http://public-api:8080/api/v1/public/;
  }

  location = /api/v1/branding/settings {
    proxy_pass http://public-api:8080/api/v1/branding/settings;
  }

  location /api/v1/auth/ {
    proxy_pass http://auth-api:8080/api/v1/auth/;
  }

  location /api/v1/system/ {
    proxy_pass http://system-api:8080/api/v1/system/;
  }
}
