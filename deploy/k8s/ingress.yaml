apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-gateway
  namespace: nex-backend
spec:
  ingressClassName: nginx
  rules:
    - host: api.nex.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-gateway
                port:
                  number: 8080
