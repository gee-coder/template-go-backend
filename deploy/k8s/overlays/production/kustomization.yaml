apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nex-backend

resources:
  - ../../base

patches:
  - path: app-configmap-patch.yaml
  - path: app-secret-patch.yaml
  - path: ingress-patch.yaml

images:
  - name: ghcr.io/gee-coder/template-go-backend-bootstrap
    newName: ghcr.io/gee-coder/template-go-backend-bootstrap
    newTag: latest
  - name: ghcr.io/gee-coder/template-go-backend-public-api
    newName: ghcr.io/gee-coder/template-go-backend-public-api
    newTag: latest
  - name: ghcr.io/gee-coder/template-go-backend-auth-api
    newName: ghcr.io/gee-coder/template-go-backend-auth-api
    newTag: latest
  - name: ghcr.io/gee-coder/template-go-backend-system-api
    newName: ghcr.io/gee-coder/template-go-backend-system-api
    newTag: latest

replicas:
  - name: public-api
    count: 3
  - name: auth-api
    count: 3
  - name: system-api
    count: 2
  - name: backend-gateway
    count: 2
