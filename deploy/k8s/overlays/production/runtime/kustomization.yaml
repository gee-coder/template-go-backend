apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nex-backend

resources:
  - ../../../base

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: backend-app-config
        namespace: nex-backend
      data:
        APP_APP_ENV: production
        APP_APP_DEBUG: "false"
        APP_AUTH_ENABLETWOFACTOR: "true"
        APP_REDIS_ADDR: redis-prod.example.internal:6379
        APP_STORAGE_PROVIDER: minio
        APP_STORAGE_MINIO_ENDPOINT: minio-prod.example.internal:9000
        APP_STORAGE_MINIO_PUBLICBASEURL: https://assets.example.com/nex-assets
        APP_STORAGE_MINIO_ROOTPATH: template/production
        APP_SMS_PROVIDER: mock
        APP_MAIL_PROVIDER: smtp
        APP_MAIL_FROMNAME: Nex Console
        APP_MAIL_FROMADDRESS: no-reply@example.com
        APP_MAIL_SMTP_HOST: smtp.example.com
        APP_MAIL_SMTP_PORT: "587"
        APP_MAIL_SMTP_USETLS: "true"
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: backend-app-secret
        namespace: nex-backend
      type: Opaque
      stringData:
        APP_DATABASE_DSN: nex:replace_me@tcp(mysql-prod.example.internal:3306)/nex_template?charset=utf8mb4&parseTime=True&loc=Local
        APP_REDIS_PASSWORD: replace-me
        APP_JWT_SECRET: replace-with-a-strong-random-secret
        APP_STORAGE_MINIO_ACCESSKEYID: replace-me
        APP_STORAGE_MINIO_ACCESSKEYSECRET: replace-me
        APP_MAIL_SMTP_USERNAME: no-reply@example.com
        APP_MAIL_SMTP_PASSWORD: replace-me
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: backend-gateway
        namespace: nex-backend
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: 10m
      spec:
        tls:
          - hosts:
              - api.example.com
            secretName: backend-gateway-tls
        rules:
          - host: api.example.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: backend-gateway
                      port:
                        number: 8080

images:
  - name: ghcr.io/gee-coder/template-go-backend-public-api
    newName: ghcr.io/gee-coder/template-go-backend-public-api
    newTag: latest
  - name: ghcr.io/gee-coder/template-go-backend-auth-api
    newName: ghcr.io/gee-coder/template-go-backend-auth-api
    newTag: latest
  - name: ghcr.io/gee-coder/template-go-backend-system-api
    newName: ghcr.io/gee-coder/template-go-backend-system-api
    newTag: latest

replicas:
  - name: public-api
    count: 3
  - name: auth-api
    count: 3
  - name: system-api
    count: 2
  - name: backend-gateway
    count: 2
