apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-gateway
  namespace: nex-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  tls:
    - hosts:
        - api.example.com
      secretName: backend-gateway-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-gateway
                port:
                  number: 8080
