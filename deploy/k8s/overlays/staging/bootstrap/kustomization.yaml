apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nex-backend-staging

resources:
  - ../../../base

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: backend-app-config
        namespace: nex-backend
      data:
        APP_APP_ENV: staging
        APP_APP_DEBUG: "false"
        APP_AUTH_ENABLETWOFACTOR: "false"
        APP_REDIS_ADDR: redis-staging.example.internal:6379
        APP_STORAGE_PROVIDER: minio
        APP_STORAGE_MINIO_ENDPOINT: minio-staging.example.internal:9000
        APP_STORAGE_MINIO_PUBLICBASEURL: https://assets-staging.example.com/nex-assets
        APP_STORAGE_MINIO_ROOTPATH: template/staging
        APP_SMS_PROVIDER: mock
        APP_MAIL_PROVIDER: mock
        APP_MAIL_FROMNAME: Nex Console Staging
        APP_MAIL_FROMADDRESS: no-reply-staging@example.com
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: backend-app-secret
        namespace: nex-backend
      type: Opaque
      stringData:
        APP_DATABASE_DSN: nex:replace_me@tcp(mysql-staging.example.internal:3306)/nex_template?charset=utf8mb4&parseTime=True&loc=Local
        APP_REDIS_PASSWORD: ""
        APP_JWT_SECRET: replace-with-a-staging-secret
        APP_STORAGE_MINIO_ACCESSKEYID: replace-me
        APP_STORAGE_MINIO_ACCESSKEYSECRET: replace-me
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: public-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: public-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: auth-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: system-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: system-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-gateway
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: backend-gateway
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: public-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: auth-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: system-api
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: backend-gateway
        namespace: nex-backend
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: backend-gateway
        namespace: nex-backend

images:
  - name: ghcr.io/gee-coder/template-go-backend-bootstrap
    newName: ghcr.io/gee-coder/template-go-backend-bootstrap
    newTag: latest
