apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-gateway
  namespace: nex-backend
  labels:
    app.kubernetes.io/name: backend-gateway
    app.kubernetes.io/part-of: template-go-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-gateway
        app.kubernetes.io/part-of: template-go-backend
    spec:
      containers:
        - name: gateway
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: gateway-config
          configMap:
            name: backend-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-gateway
  namespace: nex-backend
spec:
  selector:
    app.kubernetes.io/name: backend-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
