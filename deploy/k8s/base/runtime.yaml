apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  namespace: nex-backend
  labels:
    app.kubernetes.io/name: public-api
    app.kubernetes.io/part-of: template-go-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: public-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: public-api
        app.kubernetes.io/part-of: template-go-backend
    spec:
      containers:
        - name: public-api
          image: ghcr.io/gee-coder/template-go-backend-public-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: backend-app-config
            - secretRef:
                name: backend-app-secret
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: nex-backend
spec:
  selector:
    app.kubernetes.io/name: public-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
