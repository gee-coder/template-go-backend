apiVersion: batch/v1
kind: Job
metadata:
  name: backend-bootstrap
  namespace: nex-backend
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-bootstrap
        app.kubernetes.io/part-of: template-go-backend
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: ghcr.io/gee-coder/template-go-backend-bootstrap:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: backend-app-config
            - secretRef:
                name: backend-app-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
