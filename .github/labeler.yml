"type:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - ".github/**"
          - "docs/**"

"area:api":
  - changed-files:
      - any-glob-to-any-file:
          - "cmd/**"
          - "internal/api/**"

"area:auth":
  - changed-files:
      - any-glob-to-any-file:
          - "internal/**/auth*"
          - "internal/**/token*"

"area:rbac":
  - changed-files:
      - any-glob-to-any-file:
          - "internal/**/menu*"
          - "internal/**/role*"
          - "internal/**/user*"

"area:infra":
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - "docker-compose.yml"
          - "configs/**"
          - "scripts/**"
          - ".github/workflows/**"
