name: pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.10"

      - id: deps
        name: Download dependencies
        continue-on-error: true
        run: go mod download

      - id: test
        name: Run tests
        continue-on-error: true
        run: go test ./...

      - id: build
        name: Build api
        continue-on-error: true
        run: go build ./cmd/api

      - name: Update PR auto review comment
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEW_MARKER: "<!-- codex-pr-review -->"
          DEPS_OUTCOME: ${{ steps.deps.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const marker = process.env.REVIEW_MARKER;
            const icon = (outcome) => {
              if (outcome === "success") return "✅";
              if (outcome === "skipped") return "⚪";
              return "❌";
            };

            const body = `${marker}
            ## 自动审核结果
            ${icon(process.env.DEPS_OUTCOME)} \`go mod download\`
            ${icon(process.env.TEST_OUTCOME)} \`go test ./...\`
            ${icon(process.env.BUILD_OUTCOME)} \`go build ./cmd/api\`

            这是一条自动审核评论，用来快速判断这次 PR 是否通过基础检查。`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow if review checks did not pass
        if: ${{ steps.deps.outcome != 'success' || steps.test.outcome != 'success' || steps.build.outcome != 'success' }}
        run: exit 1
