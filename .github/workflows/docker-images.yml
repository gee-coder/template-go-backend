name: docker-images

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: bootstrap
            entry: ./cmd/bootstrap
          - name: public-api
            entry: ./cmd/public-api
          - name: auth-api
            entry: ./cmd/auth-api
          - name: system-api
            entry: ./cmd/system-api

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          owner="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/template-go-backend-${SERVICE_NAME}"
          sha_tag="${image}:sha-${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            echo "latest_tag=${image}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          build-args: |
            APP_ENTRY=${{ matrix.service.entry }}
          tags: |
            ${{ steps.prep.outputs.sha_tag }}
            ${{ steps.prep.outputs.latest_tag }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
