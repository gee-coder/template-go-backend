name: ci

on:
  push:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
      - run: go mod download
      - run: go test ./...
      - run: go build ./cmd/api
