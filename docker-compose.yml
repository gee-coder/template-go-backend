x-backend-app-env: &backend-app-env
  APP_CONFIG: /app/configs/config.docker.yaml
  APP_APP_NAME: "${APP_APP_NAME:-template-go-backend}"
  APP_APP_ENV: "${APP_APP_ENV:-docker}"
  APP_APP_DEBUG: "${APP_APP_DEBUG:-false}"
  APP_APP_UPLOADDIR: "${APP_APP_UPLOADDIR:-./storage/uploads}"
  APP_AUTH_ENABLEEMAILLOGIN: "${APP_AUTH_ENABLEEMAILLOGIN:-true}"
  APP_AUTH_ENABLEPHONELOGIN: "${APP_AUTH_ENABLEPHONELOGIN:-true}"
  APP_AUTH_ENABLEEMAILREGISTRATION: "${APP_AUTH_ENABLEEMAILREGISTRATION:-true}"
  APP_AUTH_ENABLEPHONEREGISTRATION: "${APP_AUTH_ENABLEPHONEREGISTRATION:-true}"
  APP_AUTH_ENABLETWOFACTOR: "${APP_AUTH_ENABLETWOFACTOR:-false}"
  APP_DATABASE_DSN: "${APP_DATABASE_DSN:-nex:nex123456@tcp(mysql:3306)/nex_template?charset=utf8mb4&parseTime=True&loc=Local}"
  APP_REDIS_ADDR: "${APP_REDIS_ADDR:-redis:6379}"
  APP_REDIS_PASSWORD: "${APP_REDIS_PASSWORD:-}"
  APP_REDIS_DB: "${APP_REDIS_DB:-0}"
  APP_REDIS_KEYPREFIX: "${APP_REDIS_KEYPREFIX:-nex:template:}"
  APP_JWT_ISSUER: "${APP_JWT_ISSUER:-nex-template}"
  APP_JWT_SECRET: "${APP_JWT_SECRET:-please-change-me}"
  APP_STORAGE_PROVIDER: "${APP_STORAGE_PROVIDER:-minio}"
  APP_STORAGE_LOCAL_PUBLICBASEURL: "${APP_STORAGE_LOCAL_PUBLICBASEURL:-/uploads}"
  APP_STORAGE_MINIO_ENDPOINT: "${APP_STORAGE_MINIO_ENDPOINT:-minio:9000}"
  APP_STORAGE_MINIO_ACCESSKEYID: "${APP_STORAGE_MINIO_ACCESSKEYID:-minioadmin}"
  APP_STORAGE_MINIO_ACCESSKEYSECRET: "${APP_STORAGE_MINIO_ACCESSKEYSECRET:-minioadmin}"
  APP_STORAGE_MINIO_BUCKET: "${APP_STORAGE_MINIO_BUCKET:-nex-assets}"
  APP_STORAGE_MINIO_USESSL: "${APP_STORAGE_MINIO_USESSL:-false}"
  APP_STORAGE_MINIO_PUBLICBASEURL: "${APP_STORAGE_MINIO_PUBLICBASEURL:-http://127.0.0.1:9000/nex-assets}"
  APP_STORAGE_MINIO_ROOTPATH: "${APP_STORAGE_MINIO_ROOTPATH:-template/docker}"
  APP_STORAGE_ALIYUNOSS_ENDPOINT: "${APP_STORAGE_ALIYUNOSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}"
  APP_STORAGE_ALIYUNOSS_REGION: "${APP_STORAGE_ALIYUNOSS_REGION:-cn-hangzhou}"
  APP_STORAGE_ALIYUNOSS_ACCESSKEYID: "${APP_STORAGE_ALIYUNOSS_ACCESSKEYID:-}"
  APP_STORAGE_ALIYUNOSS_ACCESSKEYSECRET: "${APP_STORAGE_ALIYUNOSS_ACCESSKEYSECRET:-}"
  APP_STORAGE_ALIYUNOSS_BUCKET: "${APP_STORAGE_ALIYUNOSS_BUCKET:-}"
  APP_STORAGE_ALIYUNOSS_PUBLICBASEURL: "${APP_STORAGE_ALIYUNOSS_PUBLICBASEURL:-}"
  APP_STORAGE_ALIYUNOSS_ROOTPATH: "${APP_STORAGE_ALIYUNOSS_ROOTPATH:-template/docker}"
  APP_STORAGE_HUAWEIOBS_ENDPOINT: "${APP_STORAGE_HUAWEIOBS_ENDPOINT:-https://obs.cn-north-4.myhuaweicloud.com}"
  APP_STORAGE_HUAWEIOBS_ACCESSKEYID: "${APP_STORAGE_HUAWEIOBS_ACCESSKEYID:-}"
  APP_STORAGE_HUAWEIOBS_ACCESSKEYSECRET: "${APP_STORAGE_HUAWEIOBS_ACCESSKEYSECRET:-}"
  APP_STORAGE_HUAWEIOBS_BUCKET: "${APP_STORAGE_HUAWEIOBS_BUCKET:-}"
  APP_STORAGE_HUAWEIOBS_PUBLICBASEURL: "${APP_STORAGE_HUAWEIOBS_PUBLICBASEURL:-}"
  APP_STORAGE_HUAWEIOBS_ROOTPATH: "${APP_STORAGE_HUAWEIOBS_ROOTPATH:-template/docker}"
  APP_SMS_PROVIDER: "${APP_SMS_PROVIDER:-mock}"
  APP_SMS_MOCK_REVEALCODE: "${APP_SMS_MOCK_REVEALCODE:-true}"
  APP_SMS_MOCK_FIXEDCODE: "${APP_SMS_MOCK_FIXEDCODE:-}"
  APP_SMS_ALIYUN_ENDPOINT: "${APP_SMS_ALIYUN_ENDPOINT:-dysmsapi.aliyuncs.com}"
  APP_SMS_ALIYUN_ACCESSKEYID: "${APP_SMS_ALIYUN_ACCESSKEYID:-}"
  APP_SMS_ALIYUN_ACCESSKEYSECRET: "${APP_SMS_ALIYUN_ACCESSKEYSECRET:-}"
  APP_SMS_ALIYUN_SIGNNAME: "${APP_SMS_ALIYUN_SIGNNAME:-}"
  APP_SMS_ALIYUN_TEMPLATECODE: "${APP_SMS_ALIYUN_TEMPLATECODE:-}"
  APP_SMS_HUAWEI_ENDPOINT: "${APP_SMS_HUAWEI_ENDPOINT:-}"
  APP_SMS_HUAWEI_APPKEY: "${APP_SMS_HUAWEI_APPKEY:-}"
  APP_SMS_HUAWEI_APPSECRET: "${APP_SMS_HUAWEI_APPSECRET:-}"
  APP_SMS_HUAWEI_SENDER: "${APP_SMS_HUAWEI_SENDER:-}"
  APP_SMS_HUAWEI_TEMPLATEID: "${APP_SMS_HUAWEI_TEMPLATEID:-}"
  APP_SMS_HUAWEI_SIGNATURE: "${APP_SMS_HUAWEI_SIGNATURE:-}"
  APP_MAIL_PROVIDER: "${APP_MAIL_PROVIDER:-mock}"
  APP_MAIL_FROMNAME: "${APP_MAIL_FROMNAME:-Nex Console}"
  APP_MAIL_FROMADDRESS: "${APP_MAIL_FROMADDRESS:-no-reply@example.com}"
  APP_MAIL_MOCK_REVEALCODE: "${APP_MAIL_MOCK_REVEALCODE:-true}"
  APP_MAIL_MOCK_FIXEDCODE: "${APP_MAIL_MOCK_FIXEDCODE:-}"
  APP_MAIL_SMTP_HOST: "${APP_MAIL_SMTP_HOST:-smtp.example.com}"
  APP_MAIL_SMTP_PORT: "${APP_MAIL_SMTP_PORT:-587}"
  APP_MAIL_SMTP_USERNAME: "${APP_MAIL_SMTP_USERNAME:-}"
  APP_MAIL_SMTP_PASSWORD: "${APP_MAIL_SMTP_PASSWORD:-}"
  APP_MAIL_SMTP_USETLS: "${APP_MAIL_SMTP_USETLS:-true}"

services:
  mysql:
    image: mysql:8.0.45
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-nex_template}"
      MYSQL_USER: "${MYSQL_USER:-nex}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-nex123456}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2.13
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-nex-assets}"
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${MINIO_BUCKET}" &&
        mc anonymous set download "local/$${MINIO_BUCKET}"

  bootstrap:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/bootstrap
    environment: *backend-app-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    restart: "no"

  public-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/public-api
    restart: unless-stopped
    environment: *backend-app-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/auth-api
    restart: unless-stopped
    environment: *backend-app-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  system-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/system-api
    restart: unless-stopped
    environment: *backend-app-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      public-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      system-api:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./deploy/nginx/backend-gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
  minio_data:
