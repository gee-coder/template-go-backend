services:
  mysql:
    image: mysql:8.0.45
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nex_template
      MYSQL_USER: nex
      MYSQL_PASSWORD: nex123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2.13
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bootstrap:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/bootstrap
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/storage/uploads
    restart: "no"

  public-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/public-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/auth-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  system-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/system-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      public-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      system-api:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/backend-gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
