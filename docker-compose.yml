version: "3.9"

services:
  mysql:
    image: mysql:8.0.45
    container_name: template-go-backend-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nex_template
      MYSQL_USER: nex
      MYSQL_PASSWORD: nex123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.2.13
    container_name: template-go-backend-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
