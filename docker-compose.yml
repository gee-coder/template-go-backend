services:
  mysql:
    image: mysql:8.0.45
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nex_template
      MYSQL_USER: nex
      MYSQL_PASSWORD: nex123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.2.13
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nex-assets &&
        mc anonymous set download local/nex-assets

  bootstrap:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/bootstrap
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    restart: "no"

  public-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/public-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/auth-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  system-api:
    build:
      context: .
      args:
        APP_ENTRY: ./cmd/system-api
    restart: unless-stopped
    environment:
      APP_CONFIG: /app/configs/config.docker.yaml
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - backend_uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      public-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      system-api:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/backend-gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
  minio_data:
